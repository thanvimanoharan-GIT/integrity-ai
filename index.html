    .cat-tab.t-all.on    { color: #e2e8f0; background: #1e2330; border-color: #2d3446; }

    .cat-tab.t-behavioral.on { color: #34d399; background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.3); }

    .q-list { display: flex; flex-direction: column; gap: 14px; }
    .q-card { background: #0d0f14; border: 1px solid #1e2330; border-radius: 12px; padding: 20px; transition: border-color .2s; }

    .q-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .q-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .qb { font-size: 11px; font-weight: 700; letter-spacing: .5px; padding: 3px 9px; border-radius: 4px; }
    .qb-technical  { background: rgba(56,189,248,.12); color: #38bdf8; border: 1px solid rgba(56,189,248,.25); }
    .qb-behavioral { background: rgba(52,211,153,.12); color: #34d399; border: 1px solid rgba(52,211,153,.25); }
    .qb-trap       { background: rgba(248,113,113,.12); color: #f87171; border: 1px solid rgba(248,113,113,.25); }
    .qb-pressure   { background: rgba(251,146,60,.12); color: #fb923c; border: 1px solid rgba(251,146,60,.25); }
    .qb-easy       { background: rgba(52,211,153,.08); color: #6ee7b7; border: 1px solid rgba(52,211,153,.15); }
    .qb-medium     { background: rgba(250,204,21,.08); color: #fcd34d; border: 1px solid rgba(250,204,21,.15); }
    .qb-hard       { background: rgba(248,113,113,.08); color: #fca5a5; border: 1px solid rgba(248,113,113,.15); }
    .qb-traptype   { background: rgba(168,85,247,.1); color: #c084fc; border: 1px solid rgba(168,85,247,.25); }
    .q-num { font-size: 12px; color: #2d3446; font-weight: 700; white-space: nowrap; margin-top: 2px; }
    .q-text { font-size: 15px; font-weight: 600; color: #e2e8f0; line-height: 1.6; margin-bottom: 12px; }
    .q-actions { display: flex; align-items: center; gap: 8px; }
    .q-copy-btn, .q-expand-btn { padding: 5px 10px; font-size: 12px; border-radius: 6px; background: #1e2330; border: 1px solid #2d3446; color: #64748b; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .q-copy-btn:hover, .q-expand-btn:hover { color: #e2e8f0; border-color: #475569; }
    .q-copy-btn.copied { color: #10b981; border-color: rgba(16,185,129,.4); }
    .q-notes { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
    .q-note { display: grid; grid-template-columns: 110px 1fr; gap: 8px; }

    .q-note-val { font-size: 13px; color: #64748b; line-height: 1.5; }
    .q-note-val.danger { color: #f87171; }
    .q-note-val.follow { color: #a855f7; font-style: italic; }
    .tips-box { margin-top: 28px; background: rgba(99,102,241,.06); border: 1px solid rgba(99,102,241,.2); border-radius: 10px; padding: 16px 20px; }
    .tips-lbl { font-size: 11px; font-weight: 700; letter-spacing: .8px; color: #6366f1; margin-bottom: 8px; }
    .tips-txt { font-size: 13px; color: #94a3b8; line-height: 1.7; }
    .export-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-top: 28px; padding-top: 24px; border-top: 1px solid #1e2330; }
    .export-info { font-size: 13px; color: #475569; }
    .export-actions { display: flex; gap: 10px; }
    .error-box { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.25); border-radius: 8px; padding: 14px 18px; margin-top: 16px; font-size: 13px; color: #fca5a5; line-height: 1.6; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0f14; }
    ::-webkit-scrollbar-thumb { background: #1e2330; border-radius: 3px; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback } = React;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function parsePDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(' ') + '\n\n';
  }
  return text.trim();
}

// ── Claude prompt (the brain of IntegrityAI) ─────────────────────────────────
const QUESTION_GEN_PROMPT = `You are IntegrityAI's Smart Question Engine — an expert technical interviewer specialising in detecting AI-assisted interview cheating.

Analyse the resume and produce a strategic question bank designed to test genuine depth and expose scripted answers.

TECHNICAL (5-7 questions): Personalised to their exact stack. Probe edge cases, trade-offs, failure modes they'd only know from real use.
BEHAVIORAL (3-4 questions): STAR-format tied to specific roles and projects in their resume.
TRAP QUESTIONS (4-5 questions) — MOST CRITICAL:
  a) FAKE TOOL TRAP: Invent a plausible-sounding but non-existent tool in their stack. Real experts say "never heard of it." Coached candidates play along.
  b) CONTRADICTION PROBE: Cross-reference two claims in their resume that reveal tension.
  c) SIMPLICITY TEST: "Explain [complex claimed skill] to a non-technical manager in 2 sentences."
  d) SPECIFICITY DRILL: Ask for exact detail only real users know — error messages, config names, default ports.
  e) ACHIEVEMENT DEPTH: If they claim "improved performance by 40%", ask for baseline metric, tool used, and single biggest change.
PRESSURE FOLLOW-UPS (3-4 questions): Force spontaneous thinking when answers feel scripted.

Respond ONLY with valid JSON, no markdown:
{
  "candidate_name": "name from resume or Candidate",
  "candidate_summary": "2-sentence honest assessment",
  "risk_flags": ["specific claims worth extra scrutiny"],
  "questions": [
    {
      "id": 1,
      "category": "technical",
      "trap_type": null,
      "difficulty": "easy",
      "question": "The exact question to ask",
      "why_it_matters": "What genuine vs coached answers reveal",
      "red_flags": "Phrases that suggest a scripted answer",
      "follow_up": "Probing follow-up"
    }
  ],
  "interviewer_tips": "2-3 sentence strategy note"
}
trap_type values: fake_tool | contradiction | simplicity | specificity | achievement_depth | null

RESUME TO ANALYSE:
`;
// ─────────────────────────────────────────────────────────────────────────────

// ── PUT YOUR ANTHROPIC API KEY HERE ──────────────────────────────────────────
// After the hackathon: delete this key and rotate it in console.anthropic.com
// Set a $2 spending limit in Anthropic Console → Settings → Limits for safety
const ANTHROPIC_API_KEY = "PASTE_YOUR_SK_ANT_KEY_HERE";
// ─────────────────────────────────────────────────────────────────────────────

async function generateQuestions(resumeText) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 4096,
      messages: [{ role: 'user', content: QUESTION_GEN_PROMPT + resumeText }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  const text = data.content[0].text;
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Unexpected response from Claude. Please try again.');
  return JSON.parse(match[0]);
}

function downloadJSON(obj, name) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

function Topbar() {
  return (
    <div className="topbar">
      <div className="logo">
        <div className="logo-icon">🛡</div>
        <div className="logo-text">Integrity<span>AI</span></div>
      </div>
      <div className="badge">MODULE 1 — SMART QUESTION ENGINE</div>
    </div>
  );
}

function Steps({ current }) {
  const list = [{ n:1, label:'Upload Resume' }, { n:2, label:'Analysing' }, { n:3, label:'Question Bank' }];
  return (
    <div className="steps">
      {list.map((s, i) => (
        <React.Fragment key={s.n}>
          {i > 0 && <div className="step-divider" />}
          <div className="step">
            <div className={`step-num ${current===s.n?'active':current>s.n?'done':''}`}>
              {current > s.n ? '✓' : s.n}
            </div>
            <div className={`step-label ${current===s.n?'active':''}`}>{s.label}</div>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

function DropZone({ file, onFile }) {
  const [drag, setDrag] = useState(false);
  const ref = useRef();
  const handleDrop = useCallback(e => {
    e.preventDefault(); setDrag(false);
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') onFile(f);
  }, [onFile]);
  return (
    <div className={`dropzone ${drag?'dragover':''} ${file?'has-file':''}`}
      onDragOver={e => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={handleDrop}
      onClick={() => ref.current.click()}>
      <input ref={ref} type="file" accept=".pdf" style={{display:'none'}}
        onChange={e => { if (e.target.files[0]) onFile(e.target.files[0]); }} />
      <div className="dz-icon">{file ? '✅' : '📄'}</div>
      {file ? (
        <>
          <div className="dz-file-name">{file.name}</div>
          <div className="dz-hint">Click to change the resume</div>
        </>
      ) : (
        <>
          <div className="dz-text"><strong>Click to upload</strong> or drag & drop your resume here</div>
          <div className="dz-hint">PDF only · Parsed in your browser · Never stored</div>
        </>
      )}
    </div>
  );
}

function Step1({ onStart, error }) {
  const [file, setFile] = useState(null);
  return (
    <div className="card">
      <div className="card-title">Upload Candidate Resume</div>
      <div className="card-sub">
        Upload a PDF resume and IntegrityAI will use Claude AI to generate a personalised
        question bank — including <strong style={{color:'#f87171'}}>trap questions</strong> designed
        to detect AI-coached answers.
      </div>
      <DropZone file={file} onFile={setFile} />
      {error && <div className="error-box">⚠️ {error}</div>}
      <button className="btn btn-primary" disabled={!file} onClick={() => onStart(file)}>
        🧠 Generate Question Bank with Claude AI
      </button>
    </div>
  );
}

function Step2({ loadingStep }) {
  const steps = [
    { id:0, label:'Reading and extracting PDF text' },
    { id:1, label:'Sending resume to Claude for analysis' },
    { id:2, label:'Building personalised question bank' },
    { id:3, label:'Generating trap questions' },
  ];
  return (
    <div className="loading-card">
      <div className="spinner" />
      <div className="loading-title">Claude is thinking…</div>
      <div className="loading-sub">Analysing the resume and generating personalised questions. This takes about 10–15 seconds.</div>
      <div className="loading-steps">
        {steps.map(s => {
          const cls = loadingStep > s.id ? 'done' : loadingStep === s.id ? 'active' : '';
          return (
            <div key={s.id} className={`loading-step ${cls}`}>
              <div className={`ls-dot ${loadingStep === s.id ? 'pulse' : ''}`} />
              {s.label}{loadingStep > s.id ? ' ✓' : ''}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function QuestionCard({ q, globalIndex }) {
  const [expanded, setExpanded] = useState(false);
  const [copied, setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(q.question); setCopied(true); setTimeout(() => setCopied(false), 1500); };
  const trapLabels = { fake_tool:'🎣 Fake Tool', contradiction:'🔀 Contradiction', simplicity:'🧠 Simplicity Test', specificity:'🔍 Specificity Drill', achievement_depth:'📊 Achievement Depth' };
  return (
    <div className="q-card">
      <div className="q-top">
        <div className="q-badges">
          <span className={`qb qb-${q.category}`}>{q.category.toUpperCase()}</span>
          <span className={`qb qb-${q.difficulty}`}>{q.difficulty}</span>
          {q.trap_type && <span className="qb qb-traptype">{trapLabels[q.trap_type] || q.trap_type}</span>}
        </div>
        <div className="q-actions">
          <span className="q-num">#{String(globalIndex+1).padStart(2,'0')}</span>
          <button className={`q-copy-btn ${copied?'copied':''}`} onClick={copy}>{copied ? '✓ Copied' : 'Copy'}</button>
          <button className="q-expand-btn" onClick={() => setExpanded(!expanded)}>{expanded ? '▲ Less' : '▼ Notes'}</button>
        </div>
      </div>
      <div className="q-text">{q.question}</div>
      {expanded && (
        <div className="q-notes">
          {q.why_it_matters && <div className="q-note"><div className="q-note-lbl">WHY IT MATTERS</div><div className="q-note-val">{q.why_it_matters}</div></div>}
          {q.red_flags && <div className="q-note"><div className="q-note-lbl">🚩 RED FLAGS</div><div className="q-note-val danger">{q.red_flags}</div></div>}
          {q.follow_up && <div className="q-note"><div className="q-note-lbl">FOLLOW-UP</div><div className="q-note-val follow">"{q.follow_up}"</div></div>}
        </div>
      )}
    </div>
  );
}

function Step3({ result, filename, onReset }) {
  const [tab, setTab] = useState('all');
  const tabs = [
    { id:'all', label:`All (${result.questions.length})` },
    { id:'technical', label:`Technical (${result.questions.filter(q=>q.category==='technical').length})` },
    { id:'behavioral', label:`Behavioral (${result.questions.filter(q=>q.category==='behavioral').length})` },
    { id:'trap', label:`Traps 🎣 (${result.questions.filter(q=>q.category==='trap').length})` },
    { id:'pressure', label:`Pressure (${result.questions.filter(q=>q.category==='pressure').length})` },
  ];
  const filtered = tab === 'all' ? result.questions : result.questions.filter(q=>q.category===tab);
  return (
    <div className="card card-wide">
      <div className="qb-header">
        <div className="qb-title">Question Bank Ready ✅</div>
        <div className="qb-meta">Candidate: <span>{result.candidate_name}</span> · <span>{result.questions.length} questions</span> · File: <span>{filename}</span></div>
      </div>
      {result.candidate_summary && <div className="summary-box"><div className="summary-label">CANDIDATE PROFILE</div><div className="summary-text">{result.candidate_summary}</div></div>}
      {result.risk_flags?.length > 0 && (<><div className="risk-title">⚠ CLAIMS TO PROBE CLOSELY</div><div className="risk-flags">{result.risk_flags.map((f,i) => <div key={i} className="risk-flag">{f}</div>)}</div></>)}
      <div className="category-tabs">
        {tabs.map(t => <button key={t.id} className={`cat-tab t-${t.id} ${tab===t.id?'on':''}`} onClick={() => setTab(t.id)}>{t.label}</button>)}
      </div>
      <div className="q-list">
        {filtered.map((q, i) => <QuestionCard key={q.id||i} q={q} globalIndex={result.questions.indexOf(q)} />)}
      </div>
      {result.interviewer_tips && <div className="tips-box"><div className="tips-lbl">💡 INTERVIEWER STRATEGY</div><div className="tips-txt">{result.interviewer_tips}</div></div>}
      <div className="export-bar">
        <div className="export-info">{result.questions.filter(q=>q.category==='trap').length} trap questions · {result.questions.filter(q=>q.category==='pressure').length} pressure follow-ups</div>
        <div className="export-actions">
          <button className="btn btn-ghost btn-sm" onClick={() => downloadJSON(result, `integrity-ai-${(result.candidate_name||'candidate').toLowerCase().replace(/\s+/g,'-')}.json`)}>Export JSON</button>
          <button className="btn btn-ghost btn-sm" onClick={onReset}>New Candidate</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [step, setStep] = useState(1);
  const [loadingStep, setLoadingStep] = useState(0);
  const [result, setResult] = useState(null);
  const [filename, setFilename] = useState('');
  const [error, setError] = useState('');

  const handleStart = async (file) => {
    setFilename(file.name); setError(''); setStep(2); setLoadingStep(0);
    try {
      const resumeText = await parsePDF(file);
      setLoadingStep(1);
      const data = await generateQuestions(resumeText);
      setLoadingStep(3);
      await new Promise(r => setTimeout(r, 500));
      setResult(data); setStep(3);
    } catch (err) {
      setError(err.message); setStep(1);
    }
  };

  const reset = () => { setStep(1); setResult(null); setError(''); setFilename(''); };

  return (
    <div className="shell">
      <Topbar />
      <div className="main">
        <Steps current={step} />
        {step === 1 && <Step1 onStart={handleStart} error={error} />}
        {step === 2 && <Step2 loadingStep={loadingStep} />}
        {step === 3 && result && <Step3 result={result} filename={filename} onReset={reset} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
